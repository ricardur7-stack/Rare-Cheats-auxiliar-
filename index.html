<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headtrick Panel</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#050000;
    position:relative;
}

/* FUNDO PARTICULAS */

canvas{
    position:absolute;
    width:100%;
    height:100%;
    z-index:0;
}

/* GLOW */

.bg-glow{
    position:absolute;
    width:700px;
    height:700px;
    background:red;
    filter:blur(200px);
    opacity:.12;
    border-radius:50%;
    z-index:0;
}

/* PANEL */

.panel{
    position:relative;
    width:920px;
    height:600px;
    border-radius:32px;
    border:2px solid #ff1a1a;
    background:rgba(10,0,0,.75);
    backdrop-filter:blur(20px);
    box-shadow:
    0 0 30px #ff000055,
    inset 0 0 40px rgba(255,0,0,.08);
    overflow:hidden;
    display:flex;
    z-index:10;
    animation:panel 2s ease;
}

@keyframes panel{
    from{
        opacity:0;
        transform:scale(.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* SIDEBAR */

.sidebar{
    width:140px;
    height:100%;
    border-right:1px solid rgba(255,0,0,.15);
    background:rgba(0,0,0,.2);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:25px;
    gap:18px;
}

.side-item{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    color:#999;
    cursor:pointer;
    padding:14px 0;
    transition:.3s;
    position:relative;
}

.side-item.active{
    color:#ff2d2d;
}

.side-item.active::before{
    content:"";
    position:absolute;
    left:0;
    width:3px;
    height:100%;
    background:#ff2d2d;
    box-shadow:0 0 15px red;
}

.side-item i{
    font-size:34px;
}

.side-item span{
    font-size:18px;
}

/* CONTENT */

.content{
    flex:1;
    padding:28px;
    position:relative;
}

/* TOP */

.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo-circle{
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid #ff2a2a;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ff2a2a;
    font-size:28px;
    box-shadow:0 0 20px red;
}

.title{
    padding:12px 50px;
    border-radius:20px;
    border:1px solid rgba(255,0,0,.2);
    background:rgba(255,0,0,.05);
    color:#ff3838;
    font-size:36px;
    font-weight:700;
    letter-spacing:2px;
    box-shadow:0 0 20px rgba(255,0,0,.15);
}

.close{
    width:58px;
    height:58px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.1);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:28px;
    cursor:pointer;
    transition:.3s;
}

.close:hover{
    transform:rotate(90deg);
    color:#ff2a2a;
}

/* CARDS */

.cards{
    margin-top:40px;
    display:flex;
    flex-direction:column;
    gap:22px;
}

.card{
    width:100%;
    height:86px;
    border-radius:28px;
    border:1px solid rgba(255,0,0,.18);
    background:linear-gradient(to right,
    rgba(35,0,0,.95),
    rgba(15,0,0,.95));
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    box-shadow:
    inset 0 0 15px rgba(255,0,0,.06),
    0 0 20px rgba(0,0,0,.5);
    transition:.3s;
}

.card:hover{
    transform:translateY(-2px);
    border-color:#ff2d2d;
}

.card h2{
    color:white;
    font-size:30px;
}

/* SWITCH */

.switch{
    width:78px;
    height:40px;
    border-radius:40px;
    background:#0d0d0d;
    position:relative;
    cursor:pointer;
    transition:.3s;
}

.switch::before{
    content:"";
    position:absolute;
    width:32px;
    height:32px;
    border-radius:50%;
    background:#333;
    top:4px;
    left:5px;
    transition:.3s;
}

.switch.active{
    background:#320000;
    box-shadow:0 0 20px rgba(255,0,0,.3);
}

.switch.active::before{
    left:41px;
    background:#ff2a2a;
    box-shadow:0 0 15px red;
}

/* SLIDER */

.slider-box{
    display:flex;
    align-items:center;
    gap:25px;
    width:100%;
}

.slider-box input{
    flex:1;
    appearance:none;
    height:4px;
    border-radius:10px;
    background:#3a0000;
    outline:none;
}

.slider-box input::-webkit-slider-thumb{
    appearance:none;
    width:26px;
    height:26px;
    border-radius:50%;
    background:#ff1a1a;
    box-shadow:0 0 15px red;
    cursor:pointer;
}

.value{
    width:70px;
    height:48px;
    border-radius:14px;
    border:1px solid rgba(255,0,0,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ff2a2a;
    font-size:28px;
    font-weight:600;
    background:#190000;
}

/* SELECT */

select{
    width:220px;
    height:55px;
    border-radius:16px;
    background:#170000;
    border:1px solid rgba(255,0,0,.2);
    color:#ff2a2a;
    font-size:24px;
    padding:0 20px;
    outline:none;
}

/* INFO */

.info{
    margin-top:30px;
    text-align:center;
    color:#8a8a8a;
    font-size:18px;
}

.info span{
    display:block;
    color:#ff2a2a;
    margin-top:10px;
    font-size:22px;
    font-weight:600;
}

.by{
    position:absolute;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    color:#ff2a2a;
    font-size:24px;
    text-shadow:0 0 15px red;
}

</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>

<div class="panel">

    <div class="sidebar">

        <div class="side-item active">
            <i class="fa-solid fa-crosshairs"></i>
            <span>AIMBOT</span>
        </div>

        <div class="side-item">
            <i class="fa-regular fa-eye"></i>
            <span>VISUAL</span>
        </div>

        <div class="side-item">
            <i class="fa-solid fa-location-crosshairs"></i>
            <span>ESP</span>
        </div>

        <div class="side-item">
            <i class="fa-solid fa-gear"></i>
            <span>MISC</span>
        </div>

        <div class="side-item">
            <i class="fa-solid fa-circle-info"></i>
            <span>INFO</span>
        </div>

    </div>

    <div class="content">

        <div class="top">

            <div class="logo">
                <div class="logo-circle">
                    <i class="fa-solid fa-crosshairs"></i>
                </div>

                <div class="title">
                    AIMBOT
                </div>
            </div>

            <div class="close">
                <i class="fa-solid fa-xmark"></i>
            </div>

        </div>

        <div class="cards">

            <div class="card">
                <h2>Aimbot</h2>
                <div class="switch active"></div>
            </div>

            <div class="card">
                <h2>Precisão Full</h2>
                <div class="switch"></div>
            </div>

            <div class="card">

                <div class="slider-box">

                    <h2>FOV</h2>

                    <input type="range" min="0" max="100" value="15" class="range">

                    <div class="value">15</div>

                </div>

            </div>

            <div class="card">

                <div class="slider-box">

                    <h2>Suavização</h2>

                    <input type="range" min="0" max="100" value="50" class="range">

                    <div class="value">50</div>

                </div>

            </div>

            <div class="card">

                <div class="slider-box">

                    <h2>Distância Máx.</h2>

                    <input type="range" min="0" max="500" value="300" class="range">

                    <div class="value">300</div>

                </div>

            </div>

            <div class="card">

                <h2>Prioridade</h2>

                <select>
                    <option>Cabeça</option>
                    <option>Peito</option>
                    <option>Pescoço</option>
                </select>

            </div>

        </div>

        <div class="info">
            criador: rugal & chatgpt
            <span>Headtrick UI System</span>
        </div>

        <div class="by">
            by headtrick
        </div>

    </div>

</div>

<script>

/* SWITCH */

document.querySelectorAll(".switch").forEach(sw=>{
    sw.onclick=()=>{
        sw.classList.toggle("active")
    }
})

/* RANGE */

document.querySelectorAll(".range").forEach(range=>{

    const value =
    range.parentElement.querySelector(".value")

    range.addEventListener("input",()=>{
        value.innerHTML = range.value
    })

})

/* PARTICLES */

const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")

canvas.width = innerWidth
canvas.height = innerHeight

let particles = []

for(let i=0;i<120;i++){

    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speedX:(Math.random()-.5)*0.5,
        speedY:(Math.random()-.5)*0.5
    })

}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height)

    particles.forEach(p=>{

        p.x += p.speedX
        p.y += p.speedY

        if(p.x > canvas.width) p.x = 0
        if(p.x < 0) p.x = canvas.width

        if(p.y > canvas.height) p.y = 0
        if(p.y < 0) p.y = canvas.height

        ctx.beginPath()
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
        ctx.fillStyle = "rgba(255,0,0,.8)"
        ctx.fill()

    })

    requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
